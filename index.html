<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/goit-js-hw-12/assets/logo-CWKflIk4.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Search</title>
    <script type="module" crossorigin src="/goit-js-hw-12/index.js"></script>
    <link rel="modulepreload" crossorigin href="/goit-js-hw-12/assets/vendor-DQvd0HNi.js">
    <link rel="stylesheet" crossorigin href="/goit-js-hw-12/assets/vendor-DumFYO8Z.css">
    <link rel="stylesheet" crossorigin href="/goit-js-hw-12/assets/index-BkfDPlRQ.css">
  </head>
  <body>
    <main>
      <section class="search-section">
        <div class="container">
          <form class="search-form" autocomplete="off">
            <label class="search-form__field">
              <input
                class="search-form__input"
                type="text"
                name="search-text"
                placeholder="Search images..."
                aria-label="Search images"
              />
            </label>
            <button class="search-form__button" type="submit">Search</button>
          </form>

          <ul class="gallery"></ul>

          <button class="load-more" type="button">Load more</button>

          <div
            class="loader"
            role="status"
            aria-live="polite"
            aria-label="Loading"
          >
            <span class="loader__spinner"></span>
          </div>
        </div>
      </section>
    </main>

  </body>
</html>
